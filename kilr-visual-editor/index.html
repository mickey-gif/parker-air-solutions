<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILR Visual Editor</title>
<style>
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #1a1a1a;
    color: #fff;
    font-family: system-ui, sans-serif;
    font-size: 13px;
  }
  #toolbar select {
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #2a2a2a;
    color: #fff;
  }
  #toolbar button {
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #333;
    color: #fff;
    cursor: pointer;
  }
  #toolbar button:hover { background: #444; }
  #editor-root { flex: 1; min-height: 0; }
  html, body { margin: 0; height: 100%; display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div id="toolbar">
    <label>Project:</label>
    <select id="project-select">
      <option value="">— New / Blank —</option>
      <option value="kilr-studios">kilr-studios</option>
      <option value="kilr-studios-v2">kilr-studios-v2</option>
      <option value="kilr-studios_v1">kilr-studios_v1</option>
      <option value="lms-electrical">lms-electrical</option>
    </select>
    <button id="export-btn" title="Download HTML + CSS">Export</button>
  </div>
  <div id="editor-root"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
