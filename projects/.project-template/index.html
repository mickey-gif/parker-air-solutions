  <link rel="stylesheet" href="css/variables.css">

<body>

  <!-- ============================================
       NAVIGATION (Exception: uses kilr-nav system, not framework layout)
       See .cursor/practices/patterns/navigation.mdc
       ============================================ -->
  <nav class="navbar" role="navigation" aria-label="Main navigation" kilr-nav="nav">
    <div class="container-xl">
      <div class="navbar_wrapper">
        <a href="#" class="navbar_brand">
          <img src="images/logo.svg" alt="[Company Name]" class="navbar_logo">
        </a>

        <ul class="navbar_menu" role="list">
          <li class="navbar_item">
            <a href="#home" class="navbar_link">Home</a>
          </li>
          <li class="navbar_item">
            <a href="#services" class="navbar_link">Services</a>
          </li>
          <li class="navbar_item">
            <a href="#about" class="navbar_link">About</a>
          </li>
          <li class="navbar_item">
            <a href="#contact" class="navbar_link">Contact</a>
          </li>
        </ul>

        <button class="navbar_cta">
          Get Started
        </button>
      </div>
    </div>
  </nav>

  <!-- ============================================
       HERO SECTION
       L1: section-xl (framework) + hero_bg (custom background combo)
       L2: container-xl
       L5+: content_hero, hero_* (custom classes start here)
       ============================================ -->
  <section class="section-xl hero_bg">
    <div class="container-xl">
      <div class="content_hero">
        <h1 class="heading-xxl">Your Main Headline Here</h1>
        <p class="paragraph-m">Your compelling subheading that describes what you do and why visitors should care.</p>
        <a href="#contact" class="hero_button">Call to Action</a>
      </div>
    </div>
  </section>
